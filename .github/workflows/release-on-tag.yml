name: Release On Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (example: v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release assets
        id: release_meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          APK_NAME="qmm-v${VERSION}.apk"
          IPA_NAME="qmm-v${VERSION}.ipa"
          NOTE_FILE=".release-notes/${TAG}.md"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          test -f "versions.json"

          FILES="versions.json"
          if [ -f "$APK_NAME" ]; then
            FILES="$FILES\n$APK_NAME"
          fi
          if [ -f "$IPA_NAME" ]; then
            FILES="$FILES\n$IPA_NAME"
          fi

          if [ "$FILES" = "versions.json" ]; then
            echo "No platform asset found for $TAG"
            exit 1
          fi

          {
            echo "files<<EOF"
            printf "%b\n" "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -f "$NOTE_FILE" ]; then
            echo "has_note=true" >> "$GITHUB_OUTPUT"
            echo "note_file=$NOTE_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "has_note=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release with custom note
        if: steps.release_meta.outputs.has_note == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          body_path: ${{ steps.release_meta.outputs.note_file }}
          fail_on_unmatched_files: true
          files: ${{ steps.release_meta.outputs.files }}

      - name: Create GitHub release with generated notes
        if: steps.release_meta.outputs.has_note != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.release_meta.outputs.files }}
